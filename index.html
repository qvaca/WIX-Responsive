<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <link rel="stylesheet" href="./header.css">
    <link rel="stylesheet" href="./section1.css">
    <link rel="stylesheet" href="./section2.css">
    <link rel="stylesheet" href="./section3.css">
    <link rel="stylesheet" href="./section4.css">
</head>
<body>
    <header>
      <div class="header-content">
        <div class="logo-wrapper">
          <img class="logo-image" src="./images/logo.png" alt="logo-image" />
        </div>
        <nav>
          <img
            class="burger-menu-icon"
            src="./images/hamburger.png"
            alt="burger-menu-icon"
          />
          <ul class="nav-list">
            <li class="nav-list-item home-list-item">
              <a class="nav-list-link home-link" href="#">Home</a>
            </li>
            <li class="nav-list-item solutions-list-item">
              <a class="nav-list-link solutions-link" href="#">Solutions</a>
            </li>
            <li class="nav-list-item faq-list-item">
              <a class="nav-list-link faq-link" href="#">FAQ</a>
            </li>
          </ul>
        </nav>
        <button class="get-started-btn">Get Started</button>
      </div>
    </header>
    <main>
         <section class="hero-section section1">
        <div
          class="background-circle section-content-wrapper section-container"
        >
          <div class="subsection1">
            <div class="title-wrapper">
              <h1 class="title">Decisions Driven by Data, Not Guesswork</h1>
            </div>
            <div class="additional-text-wrapper">
              <h2 class="additional-text">
                We build predictive models that optimize your operational
                efficiency by up to 40%
              </h2>
            </div>

            <button class="learn-more-btn">Learn More</button>

            <div class="dotted-arrow-wrapper">
              <img
                class="dotted-arrow"
                src="./images/random-dots.png"
                alt="dotted-arrow-pointing-down"
              />
            </div>
          </div>
          <div class="subsection2 form-section">
            <form class="contact-form">
              <label class="form-label">Contact Us</label>
              <div class="name-wrapper">
                <div class="input-wrapper first-name-wrapper">
                  <label class="input-label" for="first-name-input"
                    >First name *</label
                  >
                  <input
                    required
                    placeholder="Enter your first name"
                    id="first-name-input"
                    type="text"
                  />
                </div>
                <div class="input-wrapper last-name-wrapper">
                  <label class="input-label" for="last-name-input"
                    >Last name *</label
                  >
                  <input
                    required
                    placeholder="Enter your last name"
                    id="last-name-input"
                    type="text"
                  />
                </div>
              </div>
              <div class="input-wrapper email-wrapper">
                <label class="input-label" for="email-input">Email *</label>
                <input
                  required
                  placeholder="Enter your email"
                  id="email-input"
                  type="email"
                />
              </div>
              <div class="input-wrapper message-wrapper">
                <label class="input-label" for="message-textarea"
                  >Message *</label
                >
                <textarea
                  placeholder="Tell us how can we help you"
                  rows="3"
                  id="message-textarea"
                ></textarea>
              </div>
              <button class="submit-btn" type="submit">Submit</button>
            </form>
          </div>
        </div>z
      </section>
    </main>
</body>
</html>
